<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Small Group — Invoice Dashboard</title>
<style>
  :root {
    --bg: #fafafa; --card: #fff; --border: #e5e7eb; --text: #1f2937;
    --muted: #6b7280; --accent: #111827; --accent-light: #f3f4f6;
    --green: #059669; --green-bg: #ecfdf5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

  .header { background: var(--accent); color: #fff; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
  .header .subtitle { font-size: 12px; color: #9ca3af; letter-spacing: 0.5px; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; }
  .stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
  .stat-card .value { font-size: 24px; font-weight: 700; }
  .stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 2px solid var(--border); }
  .tab { padding: 10px 24px; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: var(--muted); transition: all 0.2s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .toolbar { display: flex; align-items: center; gap: 12px; padding: 16px 0; flex-wrap: wrap; }
  .search { padding: 8px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; width: 260px; outline: none; }
  .search:focus { border-color: var(--accent); }
  .btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; background: var(--card); color: var(--text); transition: all 0.15s; }
  .btn:hover { background: var(--accent-light); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { opacity: 0.9; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: var(--accent-light); padding: 10px 14px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); border-bottom: 1px solid var(--border); }
  tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #f9fafb; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-paid { background: var(--green-bg); color: var(--green); }
  .badge-export { background: #eff6ff; color: #2563eb; }
  .badge-domestic { background: #fef3c7; color: #d97706; }
  .amount { font-weight: 600; font-variant-numeric: tabular-nums; }
  .text-right { text-align: right; }
  .text-muted { color: var(--muted); }

  .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .client-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .client-card h3 { font-size: 15px; margin-bottom: 2px; }
  .client-card .meta { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .client-card .detail { font-size: 12px; margin-bottom: 3px; }
  .client-card .invoices-list { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
  .client-card .inv-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 12px; }
  .client-card .inv-row .inv-id { font-weight: 600; }
  .client-total { font-weight: 700; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 13px; display: flex; justify-content: space-between; }

  .section { display: none; }
  .section.active { display: block; }

  .download-icon::before { content: "\2193 "; }
  .hidden { display: none !important; }

  @media (max-width: 768px) {
    .container { padding: 12px; }
    .stats { grid-template-columns: 1fr 1fr; }
    .search { width: 100%; }
    .client-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

// ==================== HELPERS ====================
const clientMap = {};
clients.forEach(c => clientMap[c.id] = c);

function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function formatAmount(amount, currency) {
  if (currency === 'INR') return indianFormat(amount);
  return amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function indianFormat(n) {
  const s = n.toFixed(2);
  const [integer, decimal] = s.split('.');
  if (integer.length <= 3) return integer + '.' + decimal;
  const last3 = integer.slice(-3);
  let rest = integer.slice(0, -3);
  const groups = [];
  while (rest.length > 0) { groups.unshift(rest.slice(-2)); rest = rest.slice(0, -2); }
  return groups.join(',') + ',' + last3 + '.' + decimal;
}

function formatINR(n) { return 'INR ' + indianFormat(n); }

}

// ==================== INVOICES TABLE ====================
function renderInvoices(filter = '') {
  const f = filter.toLowerCase();
  const rows = invoices

      if (!f) return true;
      const client = clientMap[inv.clientId];
      return inv.id.toLowerCase().includes(f) || client.name.toLowerCase().includes(f) || inv.description.toLowerCase().includes(f) || inv.currency.toLowerCase().includes(f);
    })
    .map(inv => {
      const client = clientMap[inv.clientId];
      return `<tr>
        <td><strong>${inv.id}</strong></td>
        <td>${formatDate(inv.date)}</td>
        <td>${client.name}</td>
        <td class="text-muted">${inv.description}</td>
        <td>${inv.currency}</td>
        <td class="text-right amount">${formatAmount(inv.amount, inv.currency)}</td>
        <td class="text-right amount">${formatINR(inv.totalINR)}</td>
        <td><span class="badge badge-paid">${inv.status}</span></td>
        <td><button class="btn btn-sm" onclick="downloadInvoice('${inv.file}')"><span class="download-icon"></span>PDF</button></td>
      </tr>`;
    }).join('');
  document.getElementById('inv-tbody').innerHTML = rows || '<tr><td colspan="9" style="text-align:center;padding:24px;color:#999">No invoices found</td></tr>';
}

// ==================== CLIENT VIEW ====================
function renderClientView(filter = '') {

  const html = clients
    .filter(c => {
      if (!f) return true;
      return c.name.toLowerCase().includes(f) || c.country.toLowerCase().includes(f) || c.id.toLowerCase().includes(f);
    })
    .map(client => {
      const cInvs = invoices.filter(i => i.clientId === client.id);
      if (cInvs.length === 0 && f) return '';
      const totalINR = cInvs.reduce((s, i) => s + i.totalINR, 0);
      const invRows = cInvs.map(inv => `
        <div class="inv-row">
          <span class="inv-id">${inv.id}</span>
          <span class="text-muted">${formatDate(inv.date)}</span>
          <span class="amount">${inv.currency} ${formatAmount(inv.amount, inv.currency)}</span>
          <button class="btn btn-sm" onclick="downloadInvoice('${inv.file}')"><span class="download-icon"></span></button>
        </div>
      `).join('');

      return `<div class="client-card">
        <h3>${client.name}</h3>
        <div class="meta">${client.id} &bull; ${client.country} &bull; <span class="badge badge-${client.type}">${client.type}</span></div>
        ${client.contactPerson ? `<div class="detail"><strong>Contact:</strong> ${client.contactPerson}</div>` : ''}
        <div class="detail"><strong>Currency:</strong> ${client.currency}</div>
        <div class="detail"><strong>Invoices:</strong> ${cInvs.length}</div>
        <div class="invoices-list">${invRows}</div>
        <div class="client-total"><span>Total (INR)</span><span>${formatINR(totalINR)}</span></div>
      </div>`;
    }).filter(Boolean).join('');
  document.getElementById('client-grid').innerHTML = html || '<p style="padding:24px;color:#999">No clients found</p>';
}

// ==================== DOWNLOAD ====================
function downloadInvoice(filename) {
  const a = document.createElement('a');
  a.href = 'invoices/pdf/' + filename + '.pdf';
  a.download = filename + '.pdf';
  a.click();
}

async function downloadAllZip() {
  if (!window.JSZip) {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    document.head.appendChild(script);
    await new Promise(r => script.onload = r);
  }

  const zip = new JSZip();
  const btn = event.target.closest('.btn');
  const origText = btn.innerHTML;
  btn.innerHTML = 'Preparing ZIP...';
  btn.disabled = true;

  try {
    for (const inv of invoices) {
      try {
        const resp = await fetch('invoices/pdf/' + inv.file + '.pdf');
        if (resp.ok) {
          const blob = await resp.blob();
          zip.file(inv.file + '.pdf', blob);
        }
      } catch (e) { /* skip if not available */ }
    }

    const blob = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'SG-Invoices-Feb-2026.zip';
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (err) {
    alert('Error creating ZIP: ' + err.message);
  } finally {
    btn.innerHTML = origText;
    btn.disabled = false;
  }
}

// ==================== TABS ====================
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('sec-' + tab.dataset.tab).classList.add('active');
  });
});

// ==================== SEARCH ====================
document.getElementById('inv-search').addEventListener('input', e => renderInvoices(e.target.value));
document.getElementById('client-search').addEventListener('input', e => renderClientView(e.target.value));
document.getElementById('reg-search').addEventListener('input', e => renderRegistry(e.target.value));

// ==================== INIT ====================
renderStats();
renderInvoices();
renderClientView();
renderRegistry();
</script>
